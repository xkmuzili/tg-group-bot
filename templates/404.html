<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在</title>
    <style>
        :root { --bg: #0f172a; --text: #f1f5f9; --muted: #64748b; --accent: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        h1 { font-size: 80px; color: var(--accent); }
        p { color: var(--muted); margin: 16px 0 24px; }
        a { color: var(--accent); text-decoration: none; padding: 10px 24px; border: 1px solid var(--accent); border-radius: 8px; }
        a:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>🛡️ 星辰守望者没有找到这个页面</p>
        <a href="/">返回仪表盘</a>
    </div>
</body>
</html>
